name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get install -y luarocks lua5.3 2>/dev/null
          sudo luarocks install luacheck

      - name: luacheck
        run: |
          luacheck lua/ plugin/ \
            --globals vim \
            --no-max-line-length \
            --no-unused-args \
            --no-redefined

      - name: stylua (format check)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/
